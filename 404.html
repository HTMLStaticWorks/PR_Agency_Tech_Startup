<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Lost | 404 - NEO-PR Agency</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0B0F14;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .error-container {
            text-align: center;
            z-index: 2;
        }

        .glitch-text {
            font-size: 15rem;
            font-weight: 900;
            color: var(--primary);
            position: relative;
            line-height: 1;
            text-shadow: 0 0 30px rgba(0, 255, 198, 0.3);
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { text-shadow: 0 0 20px rgba(0, 255, 198, 0.2); }
            to { text-shadow: 0 0 50px rgba(0, 255, 198, 0.5); }
        }

        .signal-lost-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 255, 198, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 198, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 198, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px;
            transform: rotateX(60deg) translateY(-200px);
            opacity: 0.3;
            z-index: 1;
        }

        .back-home-btn {
            background: var(--primary);
            color: #0B0F14;
            border: none;
            padding: 15px 40px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .back-home-btn:hover {
            box-shadow: 0 0 30px var(--primary);
            transform: translateY(-5px);
            color: #0B0F14;
        }

        @media (max-width: 768px) {
            .glitch-text { font-size: 8rem; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="signal-lost-bg"></div>

    <div class="error-container">
        <div class="mb-4">
            <i data-lucide="wifi-off" class="text-primary mb-3" style="width: 60px; height: 60px;"></i>
        </div>
        <h1 class="glitch-text">404</h1>
        <h2 class="text-white fw-bold display-6 mb-4">Signal Lost.</h2>
        <p class="text-white opacity-50 mb-5 mx-auto" style="max-width: 500px;">
            The narrative path you're seeking has been decrypted or no longer exists in our database. Re-initiating main bridge protocols.
        </p>
        <a href="index.html" class="back-home-btn">
            <i data-lucide="arrow-left"></i> Re-Route Home
        </a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
