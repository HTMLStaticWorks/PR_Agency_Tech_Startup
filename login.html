<head>

    <meta property="og:description" content="Secure login for Prism PR agency clients to access their media strategy and results.">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login | Prism PR Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<body class="bg-theme-light">
    


    


    


    
    <header class="py-3 border-bottom bg-theme-white">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="d-inline-flex align-items-center text-decoration-none gap-2">
                <i class="bi bi-pentagon-half text-primary fs-2"></i>
                <span class="fw-bold fs-4 text-main">PRISM<span class="text-primary">PR</span></span>
            </a>
            <a href="register.html" class="btn btn-prism btn-prism-primary px-4 py-2">Create Account</a>
        </div>
    </header>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <!-- Centered Company Branding -->
                <div class="text-center mb-4">
                    <a href="index.html" class="d-inline-flex align-items-center text-decoration-none gap-2 mb-3">
                        <i class="bi bi-pentagon-half text-primary fs-2"></i>
                        <span class="fw-bold fs-3 text-main">PRISM<span class="text-primary">PR</span></span>
                    </a>
                    <h2 class="fw-bold mb-1">Welcome back</h2>
                    <p class="text-muted small">Access your media tracking and press kits.</p>
                </div>

                <div class="prism-card auth-card shadow-lg bg-theme-white border-0">
                    <form action="dashboard.html">
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Email Address</label>
                            <input type="email" class="form-control rounded-3 py-3" placeholder="name@company.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Password</label>
                            <input type="password" class="form-control rounded-3 py-3" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required>
                        </div>
                        <div class="d-flex justify-content-between flex-wrap gap-2 mb-5">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label small" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="small auth-link">Forgot password?</a>
                        </div>
                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="terms-login" required>
                                <label class="form-check-label small" for="terms-login">
                                    I agree to the <a href="#" class="text-primary text-decoration-none">Terms of Service</a> and <a href="#" class="text-primary text-decoration-none">Privacy Policy</a>
                                </label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-prism btn-prism-primary w-100 py-3 mb-4">Sign In</button>

                        <!-- Divider -->
                        <div class="d-flex align-items-center gap-3 mb-4">
                            <hr class="flex-grow-1 opacity-25">
                            <span class="small text-muted">or continue with</span>
                            <hr class="flex-grow-1 opacity-25">
                        </div>

                        <!-- Continue with Google -->
                        <a href="#" class="btn btn-outline-secondary w-100 py-3 mb-4 d-flex align-items-center justify-content-center gap-2 rounded-3 fw-semibold" onclick="return false;">
                            <svg width="20" height="20" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M43.611 20.083H42V20H24v8h11.303C33.654 32.657 29.332 35 24 35c-6.075 0-11-4.925-11-11s4.925-11 11-11c2.804 0 5.352 1.059 7.283 2.79l5.657-5.657C33.305 7.494 28.879 5.5 24 5.5 12.978 5.5 4 14.478 4 24s8.978 18.5 20 18.5c10.045 0 18.5-8.202 18.5-18.5 0-1.238-.124-2.447-.389-3.583z" fill="#FFC107"/>
                                <path d="M6.306 14.691L12.877 19.51C14.655 15.108 18.961 12 24 12c2.804 0 5.352 1.059 7.283 2.79l5.657-5.657C33.305 7.494 28.879 5.5 24 5.5c-7.682 0-14.34 4.388-17.694 10.691z" fill="#FF3D00"/>
                                <path d="M24 42.5c4.789 0 9.138-1.833 12.387-4.824l-5.72-4.833C28.98 34.515 26.588 35.5 24 35.5c-5.316 0-9.63-2.329-11.29-5.923l-6.526 5.029C9.509 38.044 16.29 42.5 24 42.5z" fill="#4CAF50"/>
                                <path d="M43.611 20.083H42V20H24v8h11.303a11.537 11.537 0 01-3.914 5.346l5.72 4.833C36.972 37.39 44.5 32 44.5 24c0-1.238-.124-2.447-.889-3.917z" fill="#1976D2"/>
                            </svg>
                            Continue with Google
                        </a>

                        <p class="text-center small text-muted mb-0">New client? <a href="register.html" class="text-primary fw-bold auth-link">Create an account</a></p>
                    </form>
                </div>
                <div class="text-center mt-4">
                    <a href="index.html" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left"></i> Back to Homepage</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
