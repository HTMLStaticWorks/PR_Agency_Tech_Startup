<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TechPulse PR</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            color: var(--text);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .social-auth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text);
        }

        .social-btn:hover {
            border-color: var(--secondary);
            background: var(--card);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 30px;
            opacity: 0.7;
            font-size: 0.8rem;
            color: var(--text);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider:not(:empty)::before {
            margin-right: 15px;
        }

        .divider:not(:empty)::after {
            margin-left: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 44px 14px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
        }

        .input-wrapper .toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.6;
            transition: var(--transition);
        }

        .input-wrapper .toggle-pass:hover {
            opacity: 1;
            color: var(--secondary);
        }

        .auth-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .auth-footer a {
            color: var(--secondary);
            font-weight: 600;
        }

        .auth-card a:not(.logo):hover {
            text-decoration: underline;
        }

        .auth-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
        }

        @media (max-width: 480px) {
            .auth-controls {
                top: 10px;
                right: 10px;
                gap: 8px;
            }
        }
    </style>
</head>

<body class="auth-body">
    <div class="auth-controls">
        <button id="theme-toggle" class="toggle-btn" title="Toggle Theme"><i data-lucide="moon"></i></button>
        <button id="rtl-toggle" class="btn btn-secondary" style="padding: 4px 12px; font-size: 0.8rem;">RTL</button>
    </div>

    <div class="auth-wrapper">
        <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <div class="auth-card">
                <div class="auth-header">
                    <a href="index.html" class="logo logo-accent" style="justify-content: center; margin-bottom: 20px;">
                        <i data-lucide="zap" style="color: var(--secondary);"></i><span>TECHPULSE</span>
                    </a>
                    <h2>Welcome Back</h2>
                    <p style="opacity: 0.6;">Access your PR dashboard</p>
                </div>

                <div class="social-auth">
                    <button class="social-btn">
                        <img src="https://www.google.com/favicon.ico" width="18" alt="Google"> Google
                    </button>
                    <button class="social-btn">
                        <i data-lucide="apple" size="18"></i> Apple
                    </button>
                </div>

                <div class="divider">OR CONTINUE WITH EMAIL</div>

                <form id="login-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" placeholder="name@company.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <div style="display: flex; margin-bottom: 8px;">
                            <label style="margin-bottom: 0;">Password</label>
                        </div>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                            <i data-lucide="eye" class="toggle-pass" id="pass-toggle"></i>
                        </div>
                    </div>
                    <div class="form-group" style="display: flex; align-items: center; justify-content: space-between;">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="remember">
                            <label for="remember" style="margin-bottom: 0; font-weight: 400;">Remember me</label>
                        </div>
                        <a href="#" style="font-size: 0.85rem; color: var(--secondary); font-weight: 600;">Forgot
                            Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Log In</button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="register.html">Get Started</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('click', function (e) {
            const toggle = e.target.closest('#pass-toggle');
            if (toggle) {
                const passInput = document.getElementById('password');
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                if (window.lucide) {
                    toggle.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
                    lucide.createIcons();
                }
            }
        });
    </script>
</body>

</html>
