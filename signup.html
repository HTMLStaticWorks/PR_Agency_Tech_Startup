<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Sign Up | NEO-PR Agency</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 5rem 1rem;
        }
        .auth-card {
            width: 100%;
            max-width: 480px;
            padding: 3.5rem 2.5rem;
        }
        .auth-actions {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: 1rem;
            z-index: 2000;
        }
        @media (max-width: 576px) {
            .auth-actions {
                top: 1rem;
                right: 1rem;
            }
            .auth-card {
                padding: 2.5rem 1.5rem;
            }
            .auth-container {
                padding-top: 6rem;
                padding-bottom: 3rem;
            }
        }
    </style>
</head>
<body>

    <div class="auth-actions">
        <div class="header-icon-btn" id="rtl-toggle" title="RTL/LTR">
            <i data-lucide="languages"></i>
        </div>
        <div class="header-icon-btn" id="theme-toggle" title="Toggle Theme">
            <i data-lucide="sun"></i>
        </div>
    </div>

    <div class="auth-container">
        <div class="glass-card auth-card shadow-2xl">
            <div class="text-center mb-4">
                <a href="index.html" class="d-flex align-items-center justify-content-center text-decoration-none mb-4">
                    <div class="bg-primary rounded-1 me-2" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="orbit" style="color: #0B0F14; width: 22px; height: 22px;"></i>
                    </div>
                    <span class="fw-bold fs-4 text-primary">NEO-PR</span>
                </a>
                <h3 class="fw-bold">Create Founder Account.</h3>
                <p class="opacity-50">Join the elite network of tech visionaries.</p>
            </div>

            <div class="d-grid gap-3 mb-4">
                <button class="btn btn-outline-primary w-100 text-none" style="text-transform: none;">
                    <i data-lucide="mail" class="me-2" style="width: 18px; height: 18px;"></i> Sign up with Google
                </button>
            </div>

            <div class="d-flex align-items-center mb-4">
                <hr class="flex-grow-1 border-white border-opacity-10">
                <span class="px-3 opacity-25 small text-uppercase">or use email</span>
                <hr class="flex-grow-1 border-white border-opacity-10">
            </div>

            <form action="dashboard.html">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-uppercase opacity-50">Legal Name</label>
                        <input type="text" class="form-control border-white border-opacity-10 py-3 rounded-1 text-white" placeholder="Sarah Chen" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-uppercase opacity-50">Company</label>
                        <input type="text" class="form-control border-white border-opacity-10 py-3 rounded-1 text-white" placeholder="NeuroFlow" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase opacity-50">Email Address</label>
                    <input type="email" class="form-control border-white border-opacity-10 py-3 rounded-1 text-white" placeholder="founder@techunicorn.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase opacity-50">Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control border-white border-opacity-10 py-3 rounded-1 text-white pe-5" placeholder="••••••••" required>
                        <i data-lucide="eye" class="position-absolute end-0 top-50 translate-middle-y me-3 opacity-25 cursor-pointer" style="width: 20px; height: 20px;"></i>
                    </div>
                    <div class="mt-2 small opacity-50">Min 8 characters, 1 uppercase, 1 symbol.</div>
                </div>
                
                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="terms" required>
                        <label class="form-check-label small opacity-75" for="terms">I agree to the <a href="#" class="text-primary text-decoration-none">Terms of Service</a> & <a href="#" class="text-primary text-decoration-none">Privacy Policy</a></label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>

            <div class="text-center mt-5">
                <p class="small opacity-50">Already have an account? <a href="login.html" class="text-primary text-decoration-none">Login</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
