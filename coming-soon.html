<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initializing System | Coming Soon - NEO-PR Agency</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0B0F14 !important;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        .system-init {
            text-align: center;
            z-index: 2;
            max-width: 600px;
            padding: 2rem;
        }

        .loading-ring {
            width: 120px;
            height: 120px;
            border: 4px solid rgba(0, 255, 198, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            display: inline-block;
            animation: spin-node 1.5s linear infinite;
            margin-bottom: 2rem;
            position: relative;
        }

        .loading-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--primary);
            font-weight: 800;
        }

        @keyframes spin-node {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .system-text {
            font-size: 3rem;
            font-weight: 900;
            color: white;
            letter-spacing: 5px;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .init-shroud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent, rgba(0, 255, 198, 0.03));
            pointer-events: none;
        }

        .pulse-text {
            color: var(--primary);
            font-weight: 600;
            animation: pulse-op 1.5s infinite alternate;
        }

        @keyframes pulse-op {
            from { opacity: 0.3; }
            to { opacity: 0.9; }
        }

        .subscribe-form {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 12px;
            margin-top: 2rem;
        }

        .form-control {
            background: rgba(0,0,0,0.3) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
            padding: 12px 20px;
            height: 50px;
        }

        .form-control:focus {
            border-color: var(--primary) !important;
            box-shadow: none !important;
        }

        .submit-btn {
            background: var(--primary);
            color: #0B0F14;
            border: none;
            font-weight: 800;
            height: 50px;
            border-radius: 4px;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            box-shadow: 0 0 20px var(--primary);
            transform: scale(1.02);
        }

        .btn-ghost {
            color: var(--primary);
            background: transparent;
            border: 1px solid rgba(0, 255, 198, 0.2);
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            margin-top: 2rem;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="init-shroud"></div>

    <div class="system-init">
        <div class="loading-ring">
            <div class="loading-inner">84%</div>
        </div>

        <h1 class="system-text">Initializing.</h1>
        <p class="pulse-text mb-4 text-uppercase tracking-widest">System Booting: Narrative Engine V4.2</p>
        <p class="text-white opacity-50 mb-4" style="line-height: 1.8;">
            We are currently upgrading the agency's narrative infrastructure to handle high-density media expansion. Re-initiating the main grid shortly.
        </p>

        <div class="subscribe-form">
            <p class="small fw-bold mb-3 text-uppercase">Notification Signal</p>
            <input type="email" class="form-control mb-3 text-center" placeholder="ENTER SYSTEM EMAIL">
            <button class="submit-btn w-100">JOIN THE SIGNAL</button>
        </div>

        <a href="index.html" class="btn-ghost">Return Home</a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
