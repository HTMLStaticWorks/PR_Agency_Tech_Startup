<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#212529"/>
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fd7e14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc3545;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Mitigation Shield -->
  <g opacity="1">
    <path d="M400 80C400 80 480 100 480 160C480 220 400 280 400 280C400 280 320 220 320 160C320 100 400 80 400 80Z" stroke="url(#grad3)" stroke-width="3" opacity="0.8"/>
    <circle cx="400" cy="180" r="100" stroke="#fd7e14" stroke-width="1" opacity="0.2"/>
    <circle cx="400" cy="180" r="140" stroke="#dc3545" stroke-width="1" opacity="0.1"/>
    <!-- Radar Sweep -->
    <path d="M400 180L480 100" stroke="#fd7e14" stroke-width="2" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0 400 180" to="360 400 180" dur="4s" repeatCount="indefinite" />
    </path>
    <!-- Alert Indicators -->
    <circle cx="320" cy="130" r="6" fill="#dc3545" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="500" cy="220" r="6" fill="#fd7e14" opacity="0.8">
       <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <!-- Data Grid Lines -->
    <path d="M260 180H540M400 40V320" stroke="white" stroke-width="1" opacity="0.05"/>
  </g>
  <text x="400" y="380" text-anchor="middle" fill="white" font-family="Outfit, sans-serif" font-weight="bold" font-size="16" opacity="0.5">CRISIS RAPID MITIGATION PROTOCOL</text>
</svg>
